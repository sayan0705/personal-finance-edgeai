app:
  name: personal-finance-edge-ai
  version: "0.1.0"
  log_level: "${LOG_LEVEL:INFO}"
  host: "0.0.0.0"
  port: 8000

llm:
  base_url: "${LLM_BASE_URL:http://99.27.206.243:61502/v1}"
  api_key: "${LLM_API_KEY:BANYAN_TREE_LLM_API_KEY}"
  model: "${LLM_MODEL:Qwen/Qwen3-8B}"
  max_tokens: 2048
  temperature: 0.6
  timeout_seconds: 120
  max_retries: 3

api:
  api_key: "${API_KEY:finedge-local-key-change-me}"
  cors_origins:
    - "*"
  stream_timeout_seconds: 180

guardrails:
  input:
    max_length: 4000
    min_length: 2
    injection_patterns:
      - "ignore previous instructions"
      - "you are now"
      - "forget your system prompt"
      - "jailbreak"
      - "disregard all previous"
      - "act as if you have no restrictions"
    topic_required: false
  output:
    max_length: 8000
    system_leak_patterns:
      - "my system prompt is"
      - "the system prompt says"

agent:
  enabled: true
  max_iterations: 5
  tools:
    - "tax_calculator"
    - "sip_calculator"
    - "loan_advisor"

memory:
  short_term_window: 10

rag:
  enabled: "${RAG_ENABLED:true}"
  chroma:
    host: "${CHROMA_HOST:chromadb}"
    port: "${CHROMA_PORT:8000}"
    collection: "finedge_finance_docs"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  retrieval_k: 10
  rerank_top_n: 3
  chunk_size: 512
  chunk_overlap: 64
  bm25:
    enabled: true
  reranker:
    enabled: true
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
