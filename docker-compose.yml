networks:
  finedge-net:
    driver: bridge

volumes:
  openwebui-data:
  model-cache:

services:
  mcp-tools:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: banyantree-mcp-tools
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BANYANTREE_DATA_DIR=/app/data
      - BANYANTREE_FINANCIAL_KG_ROOT=/app/data/financial_kg
      - BANYANTREE_RAW_DOCS_DIR=/app/data/financial_kg/raw_docs
      - BANYANTREE_SEED_DOCS_PATH=/app/data/financial_kg/raw_docs/seed/personal_finance_seed.json
      - BANYANTREE_PAGEINDEX_FLATTENED_DOCS_PATH=/app/data/financial_kg/raw_docs/pageindex/pageindex_flattened_docs.json
    volumes:
      - ./data:/app/data
    ports:
      - "8010:8010"
    networks:
      - finedge-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: banyantree-api
    env_file: .env
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://95.253.220.115:63084/v1}
      - LLM_API_KEY=${LLM_API_KEY:-BANYAN_TREE_LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
      - BANYANTREE_LLM_PROVIDER=api
      - BANYANTREE_API_MODEL=${LLM_MODEL:-Qwen/Qwen3-8B}
      - BANYANTREE_API_BASE_URL=${LLM_BASE_URL:-http://95.253.220.115:63084/v1}
      - BANYANTREE_API_KEY=${LLM_API_KEY:-BANYAN_TREE_LLM_API_KEY}
      - BANYANTREE_SKIP_MCP_BOOTSTRAP=1
      - BANYANTREE_MCP_BASE=http://mcp-tools:8010
      - BANYANTREE_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - API_KEY=${API_KEY:-finedge-local-key-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RAG_ENABLED=false
      - HF_HOME=/model-cache
      - TRANSFORMERS_CACHE=/model-cache/transformers
      - SENTENCE_TRANSFORMERS_HOME=/model-cache/sentence-transformers
      - BANYANTREE_DATA_DIR=/app/data
      - BANYANTREE_FINANCIAL_KG_ROOT=/app/data/financial_kg
      - BANYANTREE_RAW_DOCS_DIR=/app/data/financial_kg/raw_docs
      - BANYANTREE_SEED_DOCS_PATH=/app/data/financial_kg/raw_docs/seed/personal_finance_seed.json
      - BANYANTREE_PAGEINDEX_FLATTENED_DOCS_PATH=/app/data/financial_kg/raw_docs/pageindex/pageindex_flattened_docs.json
      - BANYANTREE_PAGEINDEX_INPUT_DIR=/app/data/financial_kg/pageindex/inputs
      - FINSAGE_KG_PATH=/app/data/financial_kg/lightrag
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - model-cache:/model-cache
    ports:
      - "8000:8000"
    networks:
      - finedge-net
    depends_on:
      mcp-tools:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: banyantree-openwebui
    environment:
      - OPENAI_API_BASE_URL=http://api:8000/v1
      - OPENAI_API_KEY=${API_KEY:-finedge-local-key-change-me}
      - WEBUI_AUTH=false
      - DEFAULT_MODELS=${LLM_MODEL:-Qwen/Qwen3-8B}
      - ENABLE_OLLAMA_API=false
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://api:8000/v1
      - RAG_OPENAI_API_KEY=${API_KEY:-finedge-local-key-change-me}
      - RAG_EMBEDDING_MODEL=text-embedding-ada-002
    volumes:
      - openwebui-data:/app/backend/data
    ports:
      - "3000:8080"
    networks:
      - finedge-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
